name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Repair and Build
        run: |
          # تحديث المكتبات وحل تعارض intl
          flutter pub add intl:^0.20.2
          flutter pub get
          
          # محاولة إصلاح ملفات الأندرويد تلقائياً
          # إذا كان المجلد مفقوداً أو تالفاً، سيتم إنشاؤه من جديد
          flutter create . --platforms android
          
          # بناء الـ APK
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SwiftBolt-APK
          path: build/app/outputs/flutter-apk/app-release.apk
